# =============================================================================
# Axon Docker — Microservice Architecture
#
# Architecture overview:
#
#   ┌──────────────┐     ┌─────────────────┐     ┌───────────────┐
#   │ axon-frontend │────▶│    axon-api     │────▶│ axon-orch     │
#   │  (Next.js)    │     │  (FastAPI 8020) │     │ (MasterGraph) │
#   └──────────────┘     └─────────────────┘     └───────┬───────┘
#                                                        │
#                    ┌───────────────────────────────────┼───────────┐
#                    │  MCP protocol                      │           │
#                    ▼                                    ▼           │
#           ┌───────────────┐  ┌──────────────┐  ┌──────────────┐    │
#           │ agent-comm    │  │ agent-ops    │  │ agent-tech   │    │
#           │ :8201         │  │ :8202        │  │ :8203        │    │
#           │ Sales         │  │ Production   │  │ QA,QC,Mainte │    │
#           │ Procurement   │  │ Logistics    │  │ PD           │    │
#           │ Finance       │  │ Warehouse    │  │              │    │
#           └───────────────┘  └──────────────┘  └──────────────┘    │
#                    │              │                │               │
#                    └──────────────┴────────────────┘               │
#                                   │                                │
#                          ┌────────▼────────┐                      │
#                          │  EBS MCP Agent  │ (external project)   │
#                          │  ports 8001-8111│                      │
#                          └─────────────────┘                      │
#                                   │                                │
#                                   │                                │
#                          ┌────────▼────────┐            ┌─────────▼────────┐
#                          │  PostgreSQL     │            │     Redis        │
#                          │  202.71.1.13    │            │  (physical)      │
#                          │  (physical)     │            │  :6379           │
#                          └─────────────────┘            └──────────────────┘
#                                   │                                │
#                          ┌────────▼────────┐
#                          │ axon-global-net │ (external docker network)
#                          └─────────────────┘
#
# Usage:
#   docker compose -f infra/docker-compose.yml build
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml down
# =============================================================================

name: axon

services:
  # ==========================================================================
  # Agent Services — each group runs as a FastMCP server
  # ==========================================================================
  agent-commercial:
    container_name: axon-agent-commercial
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_GROUP: commercial
    ports:
      - "8201:8101"
    environment:
      - AXON_AGENT_GROUP=commercial
      - AXON_DATABASE__URL=${AXON_DATABASE__URL:-postgresql+asyncpg://axon:EraOwl2026@host.docker.internal:5435/axon}
      - AXON_REDIS__URL=redis://host.docker.internal:6379/0
      - AXON_LOG_LEVEL=INFO
      # EBS MCP Agent servers (external project, running on host or separate containers)
      - AXON_MCP_ORACLE_EBS__URL=${AXON_MCP_ORACLE_EBS__URL:-http://host.docker.internal:8003/mcp}
      - AXON_MCP_AGENT_BUYER__URL=${AXON_MCP_AGENT_BUYER__URL:-http://host.docker.internal:8001/mcp}
      - AXON_MCP_AGENT_STORE__URL=${AXON_MCP_AGENT_STORE__URL:-http://host.docker.internal:8002/mcp}
      - AXON_MCP_EBS_DEMAND__URL=${AXON_MCP_EBS_DEMAND__URL:-http://host.docker.internal:8102/mcp}
      - AXON_MCP_EBS_SUPPLY__URL=${AXON_MCP_EBS_SUPPLY__URL:-http://host.docker.internal:8103/mcp}
      - AXON_MCP_EBS_PRODUCTION__URL=${AXON_MCP_EBS_PRODUCTION__URL:-http://host.docker.internal:8104/mcp}
      - AXON_MCP_EBS_LOGISTICS__URL=${AXON_MCP_EBS_LOGISTICS__URL:-http://host.docker.internal:8105/mcp}
      - AXON_MCP_EBS_QUALITY__URL=${AXON_MCP_EBS_QUALITY__URL:-http://host.docker.internal:8106/mcp}
      - AXON_MCP_EBS_ASSET__URL=${AXON_MCP_EBS_ASSET__URL:-http://host.docker.internal:8107/mcp}
      - AXON_MCP_EBS_FINANCE__URL=${AXON_MCP_EBS_FINANCE__URL:-http://host.docker.internal:8108/mcp}
      - AXON_MCP_EBS_ENGINEERING__URL=${AXON_MCP_EBS_ENGINEERING__URL:-http://host.docker.internal:8109/mcp}
      - AXON_MCP_EBS_WAREHOUSE__URL=${AXON_MCP_EBS_WAREHOUSE__URL:-http://host.docker.internal:8111/mcp}
      # LLMWiki Policy Server
      - AXON_MCP_LLMWIKI__URL=${AXON_MCP_LLMWIKI__URL:-http://host.docker.internal:8000/sse}
    networks:
      - axon-global-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent-operations:
    container_name: axon-agent-operations
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_GROUP: operations
    ports:
      - "8202:8102"
    environment:
      - AXON_AGENT_GROUP=operations
      - AXON_DATABASE__URL=${AXON_DATABASE__URL:-postgresql+asyncpg://axon:EraOwl2026@host.docker.internal:5435/axon}
      - AXON_REDIS__URL=redis://host.docker.internal:6379/0
      - AXON_LOG_LEVEL=INFO
      # EBS MCP Agent servers
      - AXON_MCP_ORACLE_EBS__URL=${AXON_MCP_ORACLE_EBS__URL:-http://host.docker.internal:8003/mcp}
      - AXON_MCP_AGENT_BUYER__URL=${AXON_MCP_AGENT_BUYER__URL:-http://host.docker.internal:8001/mcp}
      - AXON_MCP_AGENT_STORE__URL=${AXON_MCP_AGENT_STORE__URL:-http://host.docker.internal:8002/mcp}
      - AXON_MCP_EBS_DEMAND__URL=${AXON_MCP_EBS_DEMAND__URL:-http://host.docker.internal:8102/mcp}
      - AXON_MCP_EBS_SUPPLY__URL=${AXON_MCP_EBS_SUPPLY__URL:-http://host.docker.internal:8103/mcp}
      - AXON_MCP_EBS_PRODUCTION__URL=${AXON_MCP_EBS_PRODUCTION__URL:-http://host.docker.internal:8104/mcp}
      - AXON_MCP_EBS_LOGISTICS__URL=${AXON_MCP_EBS_LOGISTICS__URL:-http://host.docker.internal:8105/mcp}
      - AXON_MCP_EBS_QUALITY__URL=${AXON_MCP_EBS_QUALITY__URL:-http://host.docker.internal:8106/mcp}
      - AXON_MCP_EBS_ASSET__URL=${AXON_MCP_EBS_ASSET__URL:-http://host.docker.internal:8107/mcp}
      - AXON_MCP_EBS_FINANCE__URL=${AXON_MCP_EBS_FINANCE__URL:-http://host.docker.internal:8108/mcp}
      - AXON_MCP_EBS_ENGINEERING__URL=${AXON_MCP_EBS_ENGINEERING__URL:-http://host.docker.internal:8109/mcp}
      - AXON_MCP_EBS_WAREHOUSE__URL=${AXON_MCP_EBS_WAREHOUSE__URL:-http://host.docker.internal:8111/mcp}
      # LLMWiki Policy Server
      - AXON_MCP_LLMWIKI__URL=${AXON_MCP_LLMWIKI__URL:-http://host.docker.internal:8000/sse}
    networks:
      - axon-global-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  agent-technical:
    container_name: axon-agent-technical
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
      args:
        AGENT_GROUP: technical
    ports:
      - "8203:8103"
    environment:
      - AXON_AGENT_GROUP=technical
      - AXON_DATABASE__URL=${AXON_DATABASE__URL:-postgresql+asyncpg://axon:EraOwl2026@host.docker.internal:5435/axon}
      - AXON_REDIS__URL=redis://host.docker.internal:6379/0
      - AXON_LOG_LEVEL=INFO
      # EBS MCP Agent servers
      - AXON_MCP_ORACLE_EBS__URL=${AXON_MCP_ORACLE_EBS__URL:-http://host.docker.internal:8003/mcp}
      - AXON_MCP_AGENT_BUYER__URL=${AXON_MCP_AGENT_BUYER__URL:-http://host.docker.internal:8001/mcp}
      - AXON_MCP_AGENT_STORE__URL=${AXON_MCP_AGENT_STORE__URL:-http://host.docker.internal:8002/mcp}
      - AXON_MCP_EBS_DEMAND__URL=${AXON_MCP_EBS_DEMAND__URL:-http://host.docker.internal:8102/mcp}
      - AXON_MCP_EBS_SUPPLY__URL=${AXON_MCP_EBS_SUPPLY__URL:-http://host.docker.internal:8103/mcp}
      - AXON_MCP_EBS_PRODUCTION__URL=${AXON_MCP_EBS_PRODUCTION__URL:-http://host.docker.internal:8104/mcp}
      - AXON_MCP_EBS_LOGISTICS__URL=${AXON_MCP_EBS_LOGISTICS__URL:-http://host.docker.internal:8105/mcp}
      - AXON_MCP_EBS_QUALITY__URL=${AXON_MCP_EBS_QUALITY__URL:-http://host.docker.internal:8106/mcp}
      - AXON_MCP_EBS_ASSET__URL=${AXON_MCP_EBS_ASSET__URL:-http://host.docker.internal:8107/mcp}
      - AXON_MCP_EBS_FINANCE__URL=${AXON_MCP_EBS_FINANCE__URL:-http://host.docker.internal:8108/mcp}
      - AXON_MCP_EBS_ENGINEERING__URL=${AXON_MCP_EBS_ENGINEERING__URL:-http://host.docker.internal:8109/mcp}
      - AXON_MCP_EBS_WAREHOUSE__URL=${AXON_MCP_EBS_WAREHOUSE__URL:-http://host.docker.internal:8111/mcp}
      # LLMWiki Policy Server
      - AXON_MCP_LLMWIKI__URL=${AXON_MCP_LLMWIKI__URL:-http://host.docker.internal:8000/sse}
    networks:
      - axon-global-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================================================
  # Axon Orchestrator — LangGraph MasterGraph engine
  # ==========================================================================
  axon-orchestrator:
    container_name: axon-orchestrator
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "8200:8000"
    environment:
      - AXON_DATABASE__URL=${AXON_DATABASE__URL:-postgresql+asyncpg://axon:EraOwl2026@host.docker.internal:5435/axon}
      - AXON_REDIS__URL=redis://host.docker.internal:6379/0
      - AXON_AGENT_COMMERCIAL__URL=http://agent-commercial:8101/mcp
      - AXON_AGENT_OPERATIONS__URL=http://agent-operations:8102/mcp
      - AXON_AGENT_TECHNICAL__URL=http://agent-technical:8103/mcp
      - AXON_LOG_LEVEL=INFO
      # EBS MCP Agent servers
      - AXON_MCP_ORACLE_EBS__URL=${AXON_MCP_ORACLE_EBS__URL:-http://host.docker.internal:8003/mcp}
      - AXON_MCP_AGENT_BUYER__URL=${AXON_MCP_AGENT_BUYER__URL:-http://host.docker.internal:8001/mcp}
      - AXON_MCP_AGENT_STORE__URL=${AXON_MCP_AGENT_STORE__URL:-http://host.docker.internal:8002/mcp}
      - AXON_MCP_EBS_DEMAND__URL=${AXON_MCP_EBS_DEMAND__URL:-http://host.docker.internal:8102/mcp}
      - AXON_MCP_EBS_SUPPLY__URL=${AXON_MCP_EBS_SUPPLY__URL:-http://host.docker.internal:8103/mcp}
      - AXON_MCP_EBS_PRODUCTION__URL=${AXON_MCP_EBS_PRODUCTION__URL:-http://host.docker.internal:8104/mcp}
      - AXON_MCP_EBS_LOGISTICS__URL=${AXON_MCP_EBS_LOGISTICS__URL:-http://host.docker.internal:8105/mcp}
      - AXON_MCP_EBS_QUALITY__URL=${AXON_MCP_EBS_QUALITY__URL:-http://host.docker.internal:8106/mcp}
      - AXON_MCP_EBS_ASSET__URL=${AXON_MCP_EBS_ASSET__URL:-http://host.docker.internal:8107/mcp}
      - AXON_MCP_EBS_FINANCE__URL=${AXON_MCP_EBS_FINANCE__URL:-http://host.docker.internal:8108/mcp}
      - AXON_MCP_EBS_ENGINEERING__URL=${AXON_MCP_EBS_ENGINEERING__URL:-http://host.docker.internal:8109/mcp}
      - AXON_MCP_EBS_WAREHOUSE__URL=${AXON_MCP_EBS_WAREHOUSE__URL:-http://host.docker.internal:8111/mcp}
      # LLMWiki Policy Server
      - AXON_MCP_LLMWIKI__URL=${AXON_MCP_LLMWIKI__URL:-http://host.docker.internal:8000/sse}
    depends_on:
      agent-commercial:
        condition: service_started
      agent-operations:
        condition: service_started
      agent-technical:
        condition: service_started
    networks:
      - axon-global-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================================================
  # Axon API — FastAPI Control Tower backend
  # ==========================================================================
  axon-api:
    container_name: axon-api
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8020:8020"
    environment:
      - AXON_DATABASE__URL=${AXON_DATABASE__URL:-postgresql+asyncpg://axon:EraOwl2026@host.docker.internal:5435/axon}
      - AXON_REDIS__URL=redis://host.docker.internal:6379/0
      - AXON_LOG_LEVEL=INFO
    networks:
      - axon-global-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================================================
  # Axon Frontend — Next.js Control Tower dashboard
  # ==========================================================================
  axon-frontend:
    container_name: axon-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8020/api
    depends_on:
      - axon-api
    networks:
      - axon-global-network
    restart: unless-stopped

  # ==========================================================================
  # Excalidraw MCP Server — visual diagram generation
  # ==========================================================================
  excalidraw-mcp:
    container_name: axon-excalidraw-mcp
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    command: npx excalidraw-mcp-server --port 8089
    ports:
      - "8089:8089"
    networks:
      - axon-global-network
    profiles:
      - viz
    restart: unless-stopped

networks:
  axon-global-network:
    external: true

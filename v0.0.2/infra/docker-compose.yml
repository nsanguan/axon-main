version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  #   PostgreSQL runs on a physical server — configured via AXON_DATABASE__URL in .env
  #   MCP servers (Oracle EBS, SAP, Odoo, RAG, PostgreSQL) are separate projects.
  #   Axon connects to them via MCP client using URLs configured in .env.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
